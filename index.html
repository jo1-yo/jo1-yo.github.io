        function wireMessageModal() {
            const btn = document.getElementById('fpMsgBtn');
            const modal = document.getElementById('msgModal');
            if (!modal || modal.dataset.wired) return;
            modal.dataset.wired = '1';
            const ta = modal.querySelector('textarea');
            const box = modal.querySelector('.msg-box');
            const bg = document.getElementById('oneDSite');     // 背景内容, 弹窗开时设为 inert
            let lastFocus = null;                                 // 记住触发元素, 关闭时还焦点
            const open = (e) => {
                if (e) e.preventDefault();
                lastFocus = (e && e.currentTarget) || document.activeElement;
                modal.classList.add('open'); modal.setAttribute('aria-hidden', 'false');
                if (bg) { bg.setAttribute('aria-hidden', 'true'); bg.inert = true; }
                if (ta) setTimeout(() => ta.focus(), 60);
            };
            const close = () => {
                if (modal.contains(document.activeElement)) document.activeElement.blur(); // 先移焦, 再 aria-hidden
                modal.classList.remove('open'); modal.setAttribute('aria-hidden', 'true');
                if (bg) { bg.removeAttribute('aria-hidden'); bg.inert = false; }
                if (lastFocus && lastFocus.focus) lastFocus.focus();                       // 还焦点给触发按钮
            };
            if (btn) btn.addEventListener('click', open);
            const treeBtn = document.getElementById('treeMsgBtn');
            if (treeBtn) treeBtn.addEventListener('click', open);
            document.getElementById('msgClose').addEventListener('click', close);
            modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
            // 键盘: Esc 关闭; Tab/Shift+Tab 在弹窗内循环 (焦点陷阱)
            modal.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') { close(); return; }
                if (e.key !== 'Tab') return;
                const f = box.querySelectorAll('button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])');
                const focusable = [...f].filter(el => !el.disabled && el.offsetParent !== null);
                if (!focusable.length) return;
                const first = focusable[0], last = focusable[focusable.length - 1];
                if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
                else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
            });
            document.getElementById('msgForm').addEventListener('submit', sendMessage);
        }

        let lastTime = 0;

        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            // 计算 deltaTime
            const deltaTime = lastTime ? (currentTime - lastTime) / 1000 : 0.016;
            lastTime = currentTime;

            windTime += 0.01;

            // === 河流动画 (UV滚动，不是顶点位移) ===
            updateRiverAnimation(deltaTime);
            
            // === 跳鱼与水花动画 (秋季) ===
            if (currentSeason === 2) {
                updateFishAndSplash(deltaTime);
            }

            // Animate leaves with wind (非冬季)
            if (currentSeason !== 3) {
            leaves.forEach((leaf, i) => {
                const windEffect = Math.sin(windTime + leaf.userData.phase) * 0.1;
                leaf.position.y = leaf.userData.originalY + windEffect;
                leaf.position.x = leaf.userData.originalX + Math.sin(windTime * 0.5 + leaf.userData.phase) * 0.05;
            });
            }

            // Animate animals
            animals.forEach((animal, i) => {
                if (animal.visible) {
                    const type = animal.userData.animalType;
                    if (type === 'butterfly') {
                        animal.position.y += Math.sin(windTime * 3 + i) * 0.02;
                        animal.position.x += Math.sin(windTime * 2 + i) * 0.01;
                        // 蝴蝶扇翅：两翅绕身体轴对称开合（内缘始终贴着身体）
                        if (animal.userData.wings) {
                            const flap = Math.sin(windTime * 12) * 0.6 + 0.6; // 0 .. 1.2
                            animal.userData.wings[0].rotation.y = flap;   // 右翅
                            animal.userData.wings[1].rotation.y = -flap;  // 左翅
                        }
                    } else if (type === 'bird') {
                        animal.position.y += Math.sin(windTime * 2 + i) * 0.01;
                        // 轻微转头
                        animal.rotation.y = Math.sin(windTime * 0.5) * 0.1;
                    } else if (type === 'squirrel') {
                        // 松鼠尾巴摆动
                        animal.position.y += Math.sin(windTime * 4 + i) * 0.008;
                    } else if (type === 'rabbit') {
                        // 兔子轻微跳动
                        animal.position.y += Math.abs(Math.sin(windTime * 3 + i)) * 0.015;
                    } else if (type === 'fox') {
                        // 狐狸轻微晃动
                        animal.rotation.y = Math.sin(windTime * 0.3) * 0.05;
                    } else if (type === 'owl') {
                        // 猫头鹰转头
                        const head = animal.children.find(c => c.position && c.position.y > 0.4);
                        if (head) {
                            head.rotation.y = Math.sin(windTime * 0.8) * 0.3;
                        }
                    }
                }
            });

            // Animate falling leaves
            fallingLeaves.forEach(leaf => {
                if (leaf.visible) {
                    leaf.position.y -= leaf.userData.fallSpeed;
                    leaf.position.x = leaf.userData.startX + 
                        Math.sin(windTime * leaf.userData.swaySpeed + leaf.userData.phase) * leaf.userData.swayAmount;
                    leaf.rotation.x += 0.01;
                    leaf.rotation.y += 0.02;

                    if (leaf.position.y < 0) {
                        // 回收时仍从树冠范围内重新飘落
                        const a = Math.random() * Math.PI * 2;
                        const r = 2 + Math.random() * 7;
                        leaf.position.x = Math.cos(a) * r;
                        leaf.position.z = Math.sin(a) * r;
                        leaf.position.y = leaf.userData.startY;
                        leaf.userData.startX = leaf.position.x;
                    }
                }
            });

            // Animate snowflakes (Sprite - 自动 billboard)
            snowflakes.forEach(snowflake => {
                if (snowflake.visible) {
                    // 下落
                    snowflake.position.y -= snowflake.userData.fallSpeed;
                    
                    // 水平摇摆
                    snowflake.position.x = snowflake.userData.startX + 
                        Math.sin(windTime * snowflake.userData.swaySpeed + snowflake.userData.phase) * snowflake.userData.swayAmount;
                    
                    // Z轴轻微飘动
                    snowflake.position.z += Math.sin(windTime * 0.5 + snowflake.userData.phase) * 0.002;
                    
                    // Sprite 材质旋转 (使雪花自转)
                    if (snowflake.material && snowflake.material.rotation !== undefined) {
                        snowflake.material.rotation += snowflake.userData.rotSpeed;
                    }
                    
                    // 确保等比缩放 (避免任何父级影响)
                    const baseSize = snowflake.userData.baseSize || 0.1;
                    snowflake.scale.setScalar(baseSize);

                    // 重置到顶部
                    if (snowflake.position.y < 0) {
                        snowflake.position.y = snowflake.userData.startY;
                        snowflake.position.x = (Math.random() - 0.5) * 30;
                        snowflake.position.z = (Math.random() - 0.5) * 30;
                        snowflake.userData.startX = snowflake.position.x;
                    }
                }
            });

            updateJourney(deltaTime);

            controls.update();
            renderer.render(scene, camera);
            // 渲染后定格当前帧 → 二维像素方块 (preserveDrawingBuffer 保证可读取)
            if (pixNeedsCapture && !pixCaptured) { capturePixelFrame(); pixNeedsCapture = false; }
        }

        // Initialize
        init();
        
        // 创建积雪壳 (必须在树创建后)
        createSnowShells();
        
        transitionSeason();
    </script>
</body>
</html>
