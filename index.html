        // ============================================
        // 沿样条曲线生成河流几何体
        // ============================================
        function createRiverGeometry(curve, width, segments) {
            const geometry = new THREE.BufferGeometry();
            
            const positions = [];
            const uvs = [];
            const indices = [];
            
            const halfWidth = width / 2;
            const points = curve.getSpacedPoints(segments);
            const tangents = [];
            
            // 计算每个点的切线方向
            for (let i = 0; i < points.length; i++) {
                const t = i / (points.length - 1);
                tangents.push(curve.getTangentAt(t));
            }
            
            // 生成顶点
            for (let i = 0; i < points.length; i++) {
                const point = points[i];
                const tangent = tangents[i];
                
                // 计算垂直于切线的法线方向 (在XZ平面上)
                const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                
                // 左右两个顶点
                const leftPoint = point.clone().add(normal.clone().multiplyScalar(-halfWidth));
                const rightPoint = point.clone().add(normal.clone().multiplyScalar(halfWidth));
                
                positions.push(leftPoint.x, leftPoint.y, leftPoint.z);
                positions.push(rightPoint.x, rightPoint.y, rightPoint.z);
                
                // UV坐标: X方向0-1 (河宽), Y方向沿河流长度
                const v = i / (points.length - 1);
                uvs.push(0, v);
                uvs.push(1, v);
            }
            
            // 生成三角形索引
            for (let i = 0; i < points.length - 1; i++) {
                const a = i * 2;
                const b = i * 2 + 1;
                const c = (i + 1) * 2;
                const d = (i + 1) * 2 + 1;
                
                // 两个三角形组成一个四边形
                indices.push(a, c, b);
                indices.push(b, c, d);
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();
            
            return geometry;
        }

        // 生成程序化法线贴图 (避免外部纹理依赖)
        function createProceduralNormalMap(size, scale, seed) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.createImageData(size, size);
            const data = imageData.data;
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const i = (y * size + x) * 4;
                    
                    // 多层噪声叠加
                    const nx = x / size * scale;
                    const ny = y / size * scale;
                    
                    const n1 = Math.sin(nx * 6 + seed) * Math.cos(ny * 4 + seed * 0.7);
                    const n2 = Math.sin(nx * 12 + ny * 8 + seed * 1.3) * 0.5;
                    const n3 = Math.cos(nx * 3 - ny * 5 + seed * 0.5) * 0.3;
                    
                    const dx = (n1 + n2) * 0.5;
                    const dy = (n1 + n3) * 0.5;
                    
                    // 编码为RGB法线 (0.5 + 0.5 * value)
                    data[i] = Math.floor(128 + dx * 127);     // R = X
                    data[i + 1] = Math.floor(128 + dy * 127); // G = Y
                    data[i + 2] = 255;                         // B = Z (朝上)
                    data[i + 3] = 255;                         // A
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        function createRiver() {
            const cfg = RIVER_CONFIG;
            
            // === 1. 创建蜿蜒的样条曲线路径 ===
            // 河流从场景远处蜿蜒穿过，延伸到雾中消失
            const curvePoints = [
                new THREE.Vector3(-50, 0, 35),    // 远处起点 (被雾隐藏)
                new THREE.Vector3(-30, 0, 28),
                new THREE.Vector3(-15, 0, 18),
                new THREE.Vector3(0, 0, 12),
                new THREE.Vector3(12, 0, 8),      // 靠近树的位置
                new THREE.Vector3(18, 0, -2),
                new THREE.Vector3(25, 0, -12),
                new THREE.Vector3(35, 0, -25),
                new THREE.Vector3(50, 0, -40)     // 远处终点 (被雾隐藏)
            ];
            
            riverCurve = new THREE.CatmullRomCurve3(curvePoints, false, 'catmullrom', 0.5);
            
            // === 2. 沿样条曲线生成河流几何体 ===
            const riverGeo = createRiverGeometry(riverCurve, cfg.width, cfg.segments);
            
            // === 3. 河床几何体 (略宽，在水面下方) ===
            const riverbedGeo = createRiverGeometry(riverCurve, cfg.width + 3, cfg.segments);
            const riverbedMat = new THREE.MeshStandardMaterial({
                color: 0x2a1a0a,
                roughness: 0.95,
                metalness: 0
            });
            riverbedMesh = new THREE.Mesh(riverbedGeo, riverbedMat);
            riverbedMesh.position.y = -0.08; // 河床贴近地面
            riverbedMesh.receiveShadow = true;
            riverbedMesh.userData.type = 'river';
            riverbedMesh.userData.season = 'autumn';
            riverbedMesh.visible = false;
            scene.add(riverbedMesh);
            
            // === 4. 河岸过渡带 (沿样条曲线生成) ===
            const bankColors = [0x7a9b5a, 0x6a8b4a, 0x5a7b3a]; // 更柔和的绿色
            
            for (let side = -1; side <= 1; side += 2) {
                for (let layer = 0; layer < 3; layer++) {
                    const bankWidth = cfg.width + 2 + layer * 1.5;
                    const bankGeo = createRiverGeometry(riverCurve, bankWidth, cfg.segments);
                    const bankMat = new THREE.MeshStandardMaterial({
                        color: bankColors[layer],
                        roughness: 0.85,
                        metalness: 0,
                transparent: true,
                        opacity: 0.9 - layer * 0.15
                    });
                    const bank = new THREE.Mesh(bankGeo, bankMat);
                    bank.position.y = 0.01 - layer * 0.005; // 河岸略高于地面
                    bank.receiveShadow = true;
                    bank.userData.type = 'river';
                    bank.userData.season = 'autumn';
                    bank.visible = false;
                    scene.add(bank);
                    riverBanks.push(bank);
                }
            }
            
            // 创建两个不同比例的程序化法线贴图
            waterNormal1 = createProceduralNormalMap(256, 4, 1.0);
            waterNormal2 = createProceduralNormalMap(256, 8, 2.5);
            
            // 设置不同的重复比例避免明显平铺
            waterNormal1.repeat.set(2, 12);
            waterNormal2.repeat.set(6, 30);
            
            // 自定义水面着色器 - 双法线混合 + 菲涅尔
            const waterVertexShader = `
                varying vec2 vUv;
                varying vec3 vWorldPos;
                varying vec3 vViewDir;
                
                void main() {
                    vUv = uv;
                    vec4 worldPos = modelMatrix * vec4(position, 1.0);
                    vWorldPos = worldPos.xyz;
                    vViewDir = normalize(cameraPosition - worldPos.xyz);
                    gl_Position = projectionMatrix * viewMatrix * worldPos;
                }
            `;
            
            const waterFragmentShader = `
                uniform sampler2D uNormal1;
                uniform sampler2D uNormal2;
                uniform vec2 uOffset1;
                uniform vec2 uOffset2;
                uniform vec3 uShallowColor;
                uniform vec3 uDeepColor;
                uniform vec3 uFogColor;
                uniform float uOpacity;
                uniform float uNormalScale;
                uniform float uFresnelPower;
                uniform float uFogNear;
                uniform float uFogFar;
                
                varying vec2 vUv;
                varying vec3 vWorldPos;
                varying vec3 vViewDir;
                
                void main() {
                    // 采样两层法线并混合 (调整UV比例适配蜿蜒河流)
                    vec2 uv1 = vUv * vec2(1.5, 8.0) + uOffset1;
                    vec2 uv2 = vUv * vec2(4.0, 20.0) + uOffset2;
                    
                    vec3 n1 = texture2D(uNormal1, uv1).rgb * 2.0 - 1.0;
                    vec3 n2 = texture2D(uNormal2, uv2).rgb * 2.0 - 1.0;
                    
                    // 混合法线 (第二层权重较小)
                    vec3 normal = normalize(vec3(
                        n1.x * uNormalScale + n2.x * uNormalScale * 0.5,
                        n1.y * uNormalScale + n2.y * uNormalScale * 0.5,
                        1.0
                    ));
                    
                    // 菲涅尔效果
                    float fresnel = pow(1.0 - max(dot(vViewDir, vec3(0.0, 1.0, 0.0)), 0.0), uFresnelPower);
                    
                    // 深度颜色渐变 (基于UV的X方向模拟河流中心更深)
                    float depthFactor = 1.0 - abs(vUv.x - 0.5) * 2.0;
                    depthFactor = smoothstep(0.0, 1.0, depthFactor);
                    vec3 waterColor = mix(uShallowColor, uDeepColor, depthFactor * 0.5);
                    
                    // 法线影响的高光
                    vec3 lightDir = normalize(vec3(0.5, 1.0, 0.3));
                    vec3 halfVec = normalize(lightDir + vViewDir);
                    float spec = pow(max(dot(normal, halfVec), 0.0), 48.0) * 0.3;
                    
                    // 流动高光条纹 (更柔和)
                    float flowStreak = sin(vUv.y * 25.0 + uOffset1.y * 40.0) * 0.5 + 0.5;
                    flowStreak = pow(flowStreak, 6.0) * 0.1;
                    
                    // 最终颜色
                    vec3 finalColor = waterColor;
                    finalColor += vec3(0.75, 0.88, 1.0) * fresnel * 0.35;
                    finalColor += vec3(1.0) * spec;
                    finalColor += vec3(1.0) * flowStreak;
                    
                    // === 雾效淡出 (使河流端点融入雾中) ===
                    float fogDistance = length(vWorldPos - cameraPosition);
                    float fogFactor = smoothstep(uFogNear, uFogFar, fogDistance);
                    finalColor = mix(finalColor, uFogColor, fogFactor);
                    
                    // 边缘淡出 (河流起始和终点)
                    float edgeFade = smoothstep(0.0, 0.1, vUv.y) * smoothstep(1.0, 0.9, vUv.y);
                    float finalOpacity = uOpacity * edgeFade;
                    
                    gl_FragColor = vec4(finalColor, finalOpacity);
                }
            `;
            
            const riverMat = new THREE.ShaderMaterial({
                uniforms: {
                    uNormal1: { value: waterNormal1 },
                    uNormal2: { value: waterNormal2 },
                    uOffset1: { value: new THREE.Vector2(0, 0) },
                    uOffset2: { value: new THREE.Vector2(0, 0) },
                    uShallowColor: { value: new THREE.Color(cfg.color) },
                    uDeepColor: { value: new THREE.Color(cfg.deepColor) },
                    uFogColor: { value: new THREE.Color(0xfaf0e6) }, // 匹配场景雾色
                    uOpacity: { value: cfg.opacity },
                    uNormalScale: { value: cfg.normalScale },
                    uFresnelPower: { value: 2.2 },
                    uFogNear: { value: 25 },
                    uFogFar: { value: 60 }
                },
                vertexShader: waterVertexShader,
                fragmentShader: waterFragmentShader,
                transparent: true,
                side: THREE.DoubleSide
            });
            
            riverMesh = new THREE.Mesh(riverGeo, riverMat);
            riverMesh.position.y = cfg.waterLevel; // 水面贴近地面
            riverMesh.userData.type = 'river';
            riverMesh.userData.season = 'autumn';
            riverMesh.visible = false;
            scene.add(riverMesh);
            
            // === 创建跳鱼和水花系统 ===
            createFishAndSplashSystem();
        }
        
        // ============================================
        // 跳鱼与水花系统
        // ============================================
        function createFishAndSplashSystem() {
            // 鱼的材质
            const fishMat = new THREE.MeshStandardMaterial({
                color: 0xc0c0c0,
                roughness: 0.3,
                metalness: 0.4
            });
            
            // 预创建几条鱼 (复用)
            for (let i = 0; i < 3; i++) {
                const fishGroup = new THREE.Group();
                
                // 鱼身
                const bodyGeo = new THREE.SphereGeometry(FISH_CONFIG.fishSize, 8, 6);
                bodyGeo.scale(2, 0.6, 0.8);
                const body = new THREE.Mesh(bodyGeo, fishMat);
                fishGroup.add(body);
                
                // 鱼尾
                const tailGeo = new THREE.ConeGeometry(FISH_CONFIG.fishSize * 0.5, FISH_CONFIG.fishSize * 0.8, 4);
                const tail = new THREE.Mesh(tailGeo, fishMat);
                tail.position.x = -FISH_CONFIG.fishSize * 1.5;
                tail.rotation.z = Math.PI / 2;
                fishGroup.add(tail);
                
                fishGroup.visible = false;
                fishGroup.userData.type = 'river';
                fishGroup.userData.season = 'autumn';
                fishGroup.userData.isJumping = false;
                scene.add(fishGroup);
                jumpingFishes.push(fishGroup);
            }
            
            // 水花粒子
            const splashGeo = new THREE.SphereGeometry(0.03, 4, 4);
            const splashMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });
            
            for (let i = 0; i < 30; i++) {
                const splash = new THREE.Mesh(splashGeo, splashMat.clone());
                splash.visible = false;
                splash.userData.type = 'river';
                splash.userData.season = 'autumn';
                splash.userData.velocity = new THREE.Vector3();
                splash.userData.life = 0;
                scene.add(splash);
                splashParticles.push(splash);
            }
            
            nextFishJumpTime = Date.now() + 1000;
        }
        
        // 触发鱼跳跃
        function triggerFishJump() {
            const availableFish = jumpingFishes.find(f => !f.userData.isJumping);
            if (!availableFish || !riverCurve) return;
            
            // 在河流曲线上随机位置
            const t = 0.2 + Math.random() * 0.6; // 避免太靠近端点
            const riverPoint = riverCurve.getPointAt(t);
            
            availableFish.position.copy(riverPoint);
            availableFish.position.y = RIVER_CONFIG.waterLevel;
            availableFish.userData.isJumping = true;
            availableFish.userData.jumpStart = Date.now();
            availableFish.userData.startPos = riverPoint.clone();
            availableFish.visible = currentSeason === 2;
            
            // 随机跳跃方向
            const jumpAngle = Math.random() * Math.PI * 2;
            availableFish.userData.jumpDir = new THREE.Vector3(
                Math.cos(jumpAngle) * 0.5,
                0,
                Math.sin(jumpAngle) * 0.5
            );
            
            // 生成入水水花
            createSplash(riverPoint.x, RIVER_CONFIG.waterLevel, riverPoint.z);
        }
        
        // 创建水花
        function createSplash(x, y, z) {
            const cfg = FISH_CONFIG;
            let spawned = 0;
            
            for (let splash of splashParticles) {
                if (splash.userData.life <= 0 && spawned < cfg.splashParticles) {
                    splash.position.set(x, y, z);
                    splash.visible = currentSeason === 2;
                    splash.userData.life = 1.0;
                    
                    // 随机向外喷射
                    const angle = Math.random() * Math.PI * 2;
                    const speed = cfg.splashSpeed * (0.5 + Math.random() * 0.5);
                    splash.userData.velocity.set(
                        Math.cos(angle) * speed * 0.3,
                        speed * (0.5 + Math.random() * 0.5),
                        Math.sin(angle) * speed * 0.3
                    );
                    spawned++;
                }
            }
        }
        
        // 更新跳鱼和水花动画
        function updateFishAndSplash(deltaTime) {
            const now = Date.now();
            const cfg = FISH_CONFIG;
            
            // 检查是否该触发新的跳跃
            if (now > nextFishJumpTime && currentSeason === 2) {
                triggerFishJump();
                nextFishJumpTime = now + cfg.jumpInterval + Math.random() * cfg.jumpIntervalRandom;
            }
            
            // 更新跳跃中的鱼
            jumpingFishes.forEach(fish => {
                if (fish.userData.isJumping) {
                    const elapsed = now - fish.userData.jumpStart;
                    const progress = elapsed / cfg.jumpDuration;
                    
                    if (progress >= 1) {
                        // 跳跃结束
                        fish.userData.isJumping = false;
                        fish.visible = false;
                        // 落水水花
                        createSplash(fish.position.x, RIVER_CONFIG.waterLevel, fish.position.z);
                    } else {
                        // 抛物线运动
                        const jumpY = Math.sin(progress * Math.PI) * cfg.jumpHeight;
                        fish.position.y = RIVER_CONFIG.waterLevel + jumpY;
                        
                        // 水平移动
                        fish.position.x = fish.userData.startPos.x + fish.userData.jumpDir.x * progress;
                        fish.position.z = fish.userData.startPos.z + fish.userData.jumpDir.z * progress;
                        
                        // 旋转鱼身模拟跳跃姿态
                        fish.rotation.z = (progress - 0.5) * Math.PI * 0.8;
                        
                        // 朝向移动方向
                        fish.rotation.y = Math.atan2(fish.userData.jumpDir.z, fish.userData.jumpDir.x);
                    }
                }
            });
            
            // 更新水花粒子
            splashParticles.forEach(splash => {
                if (splash.userData.life > 0) {
                    splash.userData.life -= deltaTime * 2;
                    
                    // 物理运动
                    splash.userData.velocity.y -= 9.8 * deltaTime;
                    splash.position.add(splash.userData.velocity.clone().multiplyScalar(deltaTime));
                    
                    // 透明度衰减
                    splash.material.opacity = splash.userData.life * 0.8;
                    
                    // 到达水面或寿命结束时隐藏
                    if (splash.position.y < RIVER_CONFIG.waterLevel || splash.userData.life <= 0) {
                        splash.visible = false;
                        splash.userData.life = 0;
                    }
                }
            });
        }
        
        // 河流动画更新函数
        function updateRiverAnimation(deltaTime) {
            if (!riverMesh || !riverMesh.visible || !riverMesh.material.uniforms) return;
            
            const cfg = RIVER_CONFIG;
            const uniforms = riverMesh.material.uniforms;
            
            // 滚动UV偏移而非顶点位移
            uniforms.uOffset1.value.y -= deltaTime * cfg.flowSpeed1;
            uniforms.uOffset2.value.y -= deltaTime * cfg.flowSpeed2;
            uniforms.uOffset2.value.x += deltaTime * 0.005; // 轻微横向偏移
            
            // 防止数值过大
            if (uniforms.uOffset1.value.y < -100) uniforms.uOffset1.value.y += 100;
            if (uniforms.uOffset2.value.y < -100) uniforms.uOffset2.value.y += 100;
        }

        let touchStartX = 0;
        let touchStartY = 0;
        let isSwiping = false;
        let seasonChangeCooldown = false;

        function onKeyDown(e) {
            if (seasonChangeCooldown) return;
            
            if (e.code === 'Space' || e.code === 'ArrowRight') {
                e.preventDefault();
                if (currentSeason < 2) {
                    changeSeason(1);
                }
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                if (currentSeason > 0) {
                    changeSeason(-1);
                }
            }
        }

        let touchStartSingleX = 0;
        let touchStartSingleY = 0;
        let touchLastSingleY = 0;
        let touchStartTime = 0;
        let touchLastDist = 0;
        // 本次单指手势是否用于"环绕参观宇宙"(交给 OrbitControls 旋转, 不推进旅程)。
        // 在 touchstart 时按当前旅程进度锁定, 整个手势期间不变 —— 与 OrbitControls
        // 自己在 touchstart 时按 enableRotate 决定是否进入旋转态的时机一致,
        // 避免滑动途中跨过阈值导致行为突变。
        let touchGestureOrbit = false;

        function pinchDist(e) { const a = e.touches[0], b = e.touches[1]; return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); }

        function onTouchStart(e) {
            if (e.touches.length === 1) {
                touchStartSingleX = e.touches[0].clientX;
                touchStartSingleY = e.touches[0].clientY;
                touchLastSingleY = e.touches[0].clientY;
                touchStartTime = Date.now();
                touchGestureOrbit = !oneDActive && journey > 0.50 && journey < 0.71;
            }
            if (e.touches.length === 2) {
                touchStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                touchLastDist = pinchDist(e);
                isSwiping = true;
            }
        }

        function onTouchMove(e) {
            // 作品集页: 原生竖直滚动, 停在本页; 返回宇宙只能点右上角地球图标
            if (oneDActive) return;

            // 单指上滑 → 宇宙缩放之旅 (和电脑端滚轮/触控板效果一致); 双指捏合手势不受影响。
            // 小幅抖动/点击(<8px)不触发, 避免点击作品时误触发 journey。
            if (e.touches.length === 1) {
                // 宇宙参观阶段: 单指拖动 = OrbitControls 环绕星球, 不推进旅程
                // (继续/回退旅程用双指捏合)。preventDefault 防止页面下拉刷新等手势。
                if (touchGestureOrbit) {
                    if (Math.abs(e.touches[0].clientX - touchStartSingleX) > 8 ||
                        Math.abs(e.touches[0].clientY - touchStartSingleY) > 8) e.preventDefault();
                    return;
                }
                const y = e.touches[0].clientY;
                const dY = y - touchLastSingleY;
                touchLastSingleY = y;              // 每帧更新 → 丝滑, 和双指捏合一致
                if (Math.abs(y - touchStartSingleY) > 8) {
                    e.preventDefault();
                    // 之前 0.0052 太敏感, 一次随便的滑动(~200px)就直接冲到底, 宇宙坍塌成
                    // 马赛克那段几乎看不清就过去了。降到 0.0018, 要滑够将近一整屏才能走完
                    // 全程, 中间过程才有机会看清楚。
                    nudgeJourneyTarget(-dY * 0.0018);
                }
                return;
            }

            if (e.touches.length !== 2) return;
            e.preventDefault();
            const dist = pinchDist(e);
            const dDist = dist - touchLastDist;
            touchLastDist = dist;                  // ★ 每帧都更新 → 不会跳变(丝滑关键)
            const currentX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const deltaX = currentX - touchStartX;
            // 靠近树 + 明显横向(几乎没在捏) → 切季节, 一次手势触发一次
            if (isSwiping && journey < 0.08 && !seasonChangeCooldown &&
                Math.abs(deltaX) > 70 && Math.abs(deltaX) > Math.abs(dDist) * 4) {
                if (deltaX < 0 && currentSeason < 2) changeSeason(1);
                else if (deltaX > 0 && currentSeason > 0) changeSeason(-1);
                isSwiping = false;
                return;
            }
            // 双指捏合 → 每帧连续平滑驱动。捏开(放大): 先把旅程拉回树(journey↓),
            // 拉到头后继续捏开 = 镜头靠近树细看(treeZoom↑); 捏合(缩小)反向:
            // 先退出树部特写, 退完才推进宇宙之旅。跟单指上滑同样的慢灵敏度。
            if (dDist > 0) {
                if (journeyTarget > 0.001) nudgeJourneyTarget(-dDist * 0.0018);
                else treeZoomTarget = clampN(treeZoomTarget + dDist * 0.004, 0, 1);
            } else {
                if (treeZoomTarget > 0.001) treeZoomTarget = clampN(treeZoomTarget + dDist * 0.004, 0, 1);
                else nudgeJourneyTarget(-dDist * 0.0018);
            }
        }

        function onTouchEnd(e) {
            isSwiping = false;

            // Single tap: detect short-duration, low-movement touch and raycast for project objects
            if (e.changedTouches.length === 1) {
                const touch = e.changedTouches[0];
                const dx = touch.clientX - touchStartSingleX;
                const dy = touch.clientY - touchStartSingleY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const elapsed = Date.now() - touchStartTime;

                if (dist < 12 && elapsed < 300) {
                    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;

                    raycaster.setFromCamera(mouse, camera);
                    const visibleObjects = interactiveObjects.filter(obj => obj.visible);
                    const intersects = raycaster.intersectObjects(visibleObjects, true);

                    if (intersects.length > 0) {
                        let obj = intersects[0].object;
                        while (obj && obj.userData.projectId === undefined && obj.parent) {
                            obj = obj.parent;
                        }
                        if (obj && obj.userData.projectId !== undefined) {
                            openProject(obj.userData.projectId);
                        }
                    }
                }
            }
        }

        function onWheel(e) {
            // 作品集页: 原生竖直滚动, 停在本页; 返回宇宙只能点右上角地球图标
            if (oneDActive) return;
            // 靠近树时, 横向滑动切换季节
            if (journey < 0.08 && Math.abs(e.deltaX) > Math.abs(e.deltaY) && Math.abs(e.deltaX) > 30) {
                if (!seasonChangeCooldown) {
                    e.preventDefault();
                    if (e.deltaX > 0 && currentSeason < 2) changeSeason(1);
                    else if (e.deltaX < 0 && currentSeason > 0) changeSeason(-1);
                }
                return;
            }
            // 滚轮/触控板 → 宇宙缩放之旅。触控板双指捏合是 ctrl+wheel 且增量很小 → 给大灵敏度;
            // 普通双指滚动用基础灵敏度(整体调高, 之前太难拉)
            e.preventDefault();
            const zoomSens = e.ctrlKey ? 0.012 : 0.0014;
            const dj = e.deltaY * zoomSens;   // >0 = 缩小(推进旅程), <0 = 放大
            // 与双指捏合同一套路由: 放大到旅程 0 之后继续放大 = 靠近树细看。
            if (dj < 0) {
                if (journeyTarget > 0.001) nudgeJourneyTarget(dj);
                else treeZoomTarget = clampN(treeZoomTarget - dj * 2.2, 0, 1);
            } else {
                if (treeZoomTarget > 0.001) treeZoomTarget = clampN(treeZoomTarget - dj * 2.2, 0, 1);
                else nudgeJourneyTarget(dj);
            }
        }

        function changeSeason(direction) {
            if (seasonChangeCooldown) return;
            
            targetSeason = Math.max(0, Math.min(2, currentSeason + direction));
            if (targetSeason !== currentSeason) {
                seasonChangeCooldown = true;
                currentSeason = targetSeason;
                updateSeasonUI();
                transitionSeason();
                
                setTimeout(() => {
                    seasonChangeCooldown = false;
                }, 800);
            }
        }
        
        // 点击跳转到指定季节
        function jumpToSeason(seasonIndex) {
            if (seasonChangeCooldown || seasonIndex === currentSeason) return;
            if (seasonIndex < 0 || seasonIndex > 2) return;
            
            seasonChangeCooldown = true;
            currentSeason = seasonIndex;
            updateSeasonUI();
            transitionSeason();
            
            setTimeout(() => {
                seasonChangeCooldown = false;
            }, 800);
        }
        
        // 设置季节点击切换
        function setupSeasonDotClicks() {
            document.querySelectorAll('.scroll-dot').forEach((dot) => {
                dot.style.cursor = 'pointer';
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const seasonIndex = parseInt(dot.getAttribute('data-season'));
                    jumpToSeason(seasonIndex);
                });
            });
        }

        function updateSeasonUI() {
            // Update season title with animation reset
            document.querySelectorAll('.season-name').forEach(el => {
                el.classList.remove('active');
                el.style.animation = 'none';
                el.offsetHeight; // Trigger reflow
                el.style.animation = '';
            });
            
            const activeTitle = document.getElementById(`${seasons[currentSeason]}Title`);
            activeTitle.classList.add('active');

            // Update dots
            document.querySelectorAll('.scroll-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSeason);
            });

            // Update hint text
            document.getElementById('hintText').textContent = hintTexts[currentSeason];
        }

        // ============================================
        // 可调参数 - 冬季积雪
        // ============================================
        const SNOW_CONFIG = {
            normalYThreshold: 0.45,   // 世界法线Y阈值 (稍低一点让雪覆盖更多)
            snowThickness: 0.12,      // 积雪厚度 (增加一点填补缝隙)
            snowRoughness: 0.92,      // 积雪粗糙度
            snowOpacity: 0.95,        // 积雪透明度
            snowColor: 0xe8eaec,      // 积雪颜色 (稍深的白色)
            edgeSoftness: 0.2         // 边缘过渡柔和度 (更柔和的边缘帮助融合)
        };

        let snowShells = []; // 存储积雪 mesh 引用
        let snowShaderMaterial = null; // 共享的积雪着色器材质

        // 创建积雪着色器材质 (基于世界法线Y控制可见性)
        function createSnowShaderMaterial() {
            const cfg = SNOW_CONFIG;
            
            const snowVertexShader = `
                varying vec3 vWorldNormal;
                varying vec3 vWorldPos;
                
                void main() {
                    // 计算世界空间法线
                    vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
                    vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                    gl_Position = projectionMatrix * viewMatrix * vec4(vWorldPos, 1.0);
                }
            `;
            
            const snowFragmentShader = `
                uniform vec3 uSnowColor;
                uniform float uOpacity;
                uniform float uThreshold;
                uniform float uSoftness;
                
                varying vec3 vWorldNormal;
                varying vec3 vWorldPos;
                
                void main() {
                    // 基于世界法线Y分量决定积雪可见性
                    float snowAmount = smoothstep(uThreshold - uSoftness, uThreshold + uSoftness, vWorldNormal.y);
                    
                    // 完全没有积雪的地方直接丢弃
                    if (snowAmount < 0.01) discard;
                    
                    // 简单光照
                    vec3 lightDir = normalize(vec3(0.5, 1.0, 0.3));
                    float diffuse = max(dot(vWorldNormal, lightDir), 0.3);
                    
                    // 轻微的蓝色阴影
                    vec3 shadowColor = vec3(0.85, 0.9, 1.0);
                    vec3 finalColor = mix(shadowColor * 0.7, uSnowColor, diffuse);
                    
                    // 细微的闪光点
                    float sparkle = pow(max(dot(vWorldNormal, normalize(vec3(0.3, 1.0, 0.5))), 0.0), 32.0);
                    finalColor += vec3(1.0) * sparkle * 0.2;
                    
                    gl_FragColor = vec4(finalColor, uOpacity * snowAmount);
                }
            `;
            
            return new THREE.ShaderMaterial({
                uniforms: {
                    uSnowColor: { value: new THREE.Color(cfg.snowColor) },
                    uOpacity: { value: cfg.snowOpacity },
                    uThreshold: { value: cfg.normalYThreshold },
                    uSoftness: { value: cfg.edgeSoftness }
                },
                vertexShader: snowVertexShader,
                fragmentShader: snowFragmentShader,
                transparent: true,
                side: THREE.FrontSide,
                depthWrite: true
            });
        }

        // ============================================
        // 添加积雪壳 (复制几何体并沿法线扩展)
        // ============================================
        function addSnowShell(mesh) {
            if (!mesh.geometry) return null;
            
            const cfg = SNOW_CONFIG;
            
            // 克隆几何体
            const geo = mesh.geometry.clone();
            
            // 确保有法线
            if (!geo.attributes.normal) {
                geo.computeVertexNormals();
            }
            
            const positions = geo.attributes.position;
            const normals = geo.attributes.normal;
            
            // 沿法线方向均匀扩展 (创建"壳")
            const newPositions = new Float32Array(positions.count * 3);
            
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                const z = positions.getZ(i);
                
                const nx = normals.getX(i);
                const ny = normals.getY(i);
                const nz = normals.getZ(i);
                
                // 沿法线扩展固定厚度
                newPositions[i * 3] = x + nx * cfg.snowThickness;
                newPositions[i * 3 + 1] = y + ny * cfg.snowThickness;
                newPositions[i * 3 + 2] = z + nz * cfg.snowThickness;
            }
            
            geo.setAttribute('position', new THREE.BufferAttribute(newPositions, 3));
            geo.computeVertexNormals();
            
            // 使用共享的着色器材质
            if (!snowShaderMaterial) {
                snowShaderMaterial = createSnowShaderMaterial();
            }
            
            const snowMesh = new THREE.Mesh(geo, snowShaderMaterial);
            
            // 复制原 mesh 的变换
            snowMesh.position.copy(mesh.position);
            snowMesh.rotation.copy(mesh.rotation);
            snowMesh.scale.copy(mesh.scale);
            snowMesh.quaternion.copy(mesh.quaternion);
            
            // 如果原 mesh 有父级，需要考虑父级变换
            if (mesh.parent && mesh.parent !== scene) {
                // 获取世界变换
                const worldPos = new THREE.Vector3();
                const worldQuat = new THREE.Quaternion();
                const worldScale = new THREE.Vector3();
                mesh.getWorldPosition(worldPos);
                mesh.getWorldQuaternion(worldQuat);
                mesh.getWorldScale(worldScale);
                
                snowMesh.position.copy(worldPos);
                snowMesh.quaternion.copy(worldQuat);
                snowMesh.scale.copy(worldScale);
            }
            
            snowMesh.castShadow = true;
            snowMesh.receiveShadow = true;
            snowMesh.userData.isSnow = true;
            snowMesh.visible = false;
            
            return snowMesh;
        }

        // 创建所有积雪
        function createSnowShells() {
            // 为树干添加积雪
            if (trunkMesh) {
                const trunkSnow = addSnowShell(trunkMesh);
                if (trunkSnow) {
                    scene.add(trunkSnow);
                    snowShells.push(trunkSnow);
                }
            }
            
            // 为分支添加积雪
            branchMeshes.forEach(branch => {
                const branchSnow = addSnowShell(branch);
                if (branchSnow) {
                    scene.add(branchSnow);
                    snowShells.push(branchSnow);
                }
            });
            
            // 不再为接头添加积雪（已移除接头）
        }

        function transitionSeason() {
            const season = seasons[currentSeason];
            const colors = seasonColors[season];

            // Background transition
            scene.background = new THREE.Color(colors.bg[0], colors.bg[1], colors.bg[2]);
            scene.fog.color = new THREE.Color(colors.bg[0], colors.bg[1], colors.bg[2]);

            // Update leaves color
            leaves.forEach(leaf => {
                leaf.material.color.setHex(colors.leaves);
            });

            // Toggle seasonal elements
            // Spring elements
            interactiveObjects.forEach(obj => {
                if (obj.userData.type === 'spring') {
                    obj.visible = currentSeason === 0;
                }
            });
            flowers.forEach(f => f.visible = currentSeason === 0);

            // Summer elements
            animals.forEach(a => {
                a.visible = currentSeason === 1;
            });

            // Autumn elements
            // 秋天入场时, 把叶子随机撒在整条下落路径的各个高度上(而非全部堆在树冠顶端),
            // 让它们看起来"本来就正在飘落"的稳定状态, 而不是一开场就一股脑往下倒。
            const enteringAutumn = currentSeason === 2 && fallingLeaves.length && !fallingLeaves[0].visible;
            fallingLeaves.forEach(l => {
                l.visible = currentSeason === 2;
            });
            if (enteringAutumn) {
                fallingLeaves.forEach(l => {
                    const a = Math.random() * Math.PI * 2;
                    const r = 2 + Math.random() * 7;
                    l.position.x = Math.cos(a) * r;
                    l.position.z = Math.sin(a) * r;
                    l.position.y = Math.random() * l.userData.startY;
                    l.userData.startX = l.position.x;
                });
            }

            // 河流及河岸 (秋季)
            scene.children.forEach(child => {
                if (child.userData.type === 'river') {
                    child.visible = currentSeason === 2;
                }
            });
            riverBanks.forEach(bank => {
                bank.visible = currentSeason === 2;
            });

            // Winter elements
            snowflakes.forEach(s => {
                s.visible = currentSeason === 3;
            });

            // === 冬季特殊处理 ===
            if (currentSeason === 3) {
                // 冬季：隐藏整棵树，显示雪人
                if (tree) tree.visible = false;
                leaves.forEach(leaf => leaf.visible = false);
                snowShells.forEach(snow => snow.visible = false);
                branchMeshes.forEach(branch => branch.visible = false);
                if (trunkMesh) trunkMesh.visible = false;
                
                // 显示雪人和所有可交互部件
                if (snowman) snowman.visible = true;
                snowmanParts.forEach(part => part.visible = true);
                
                // 设置冬季地面 (纯白雪地)
                setWinterGround();
            } else {
                // 非冬季：显示树，隐藏雪人
                if (tree) tree.visible = true;
                leaves.forEach(leaf => {
                    leaf.visible = true;
                    leaf.material.opacity = 0.9;
                });
                
                snowShells.forEach(snow => {
                    snow.visible = false;
                });
                branchMeshes.forEach(branch => branch.visible = true);
                if (trunkMesh) trunkMesh.visible = true;
                
                // 隐藏雪人
                if (snowman) snowman.visible = false;
                snowmanParts.forEach(part => part.visible = false);
                
                // 恢复非冬季地面
                restoreNonWinterGround();
            }
        }

        // ============================================
        // 动物拖拽系统
        // ============================================
        let isDragging = false;
        let draggedAnimal = null;
        let dragStartTime = 0;
        let dragStartPos = new THREE.Vector2();
        const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); // Y=0 地面平面
        const DRAG_THRESHOLD = 10; // 像素，区分点击和拖拽
        const CLICK_TIME_THRESHOLD = 500; // 毫秒，快速点击判定（增加）

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // 如果正在拖拽动物
            if (isDragging && draggedAnimal) {
                handleAnimalDrag(event);
                return;
            }

            checkHover();

            const hint = document.getElementById('clickHint');
            if (hoveredObject) {
                hint.style.left = event.clientX + 15 + 'px';
                hint.style.top = event.clientY + 15 + 'px';
                hint.classList.add('visible');
            } else {
                hint.classList.remove('visible');
            }
        }

        function handleAnimalDrag(event) {
            raycaster.setFromCamera(mouse, camera);
            
            // 获取射线与地面平面的交点
            const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(groundPlane, intersectPoint);
            
            if (intersectPoint) {
                // 限制动物在合理范围内移动
                const clampedX = Math.max(-20, Math.min(20, intersectPoint.x));
                const clampedZ = Math.max(-20, Math.min(20, intersectPoint.z));
                
                // 获取动物的原始Y高度偏移 (保持动物不贴地)
                const baseY = draggedAnimal.userData.originalY || draggedAnimal.position.y;
                const animalType = draggedAnimal.userData.animalType;
                
                // 根据动物类型设置不同的Y高度
                let targetY = 0.5; // 默认地面高度
                if (animalType === 'squirrel') targetY = 0.5;
                else if (animalType === 'rabbit') targetY = 0.5;
                else if (animalType === 'deer') targetY = 1.5;
                else if (animalType === 'bird') targetY = intersectPoint.y + 2; // 鸟在空中
                else if (animalType === 'butterfly') targetY = intersectPoint.y + 3;
                else if (animalType === 'owl') targetY = intersectPoint.y + 4;
                
                // 平滑移动
                draggedAnimal.position.x += (clampedX - draggedAnimal.position.x) * 0.3;
                draggedAnimal.position.z += (clampedZ - draggedAnimal.position.z) * 0.3;
                
                // 对于飞行动物，可以用射线Y来控制高度
                if (animalType === 'bird' || animalType === 'butterfly' || animalType === 'owl') {
                    const targetHeight = Math.max(3, Math.min(20, 10 + intersectPoint.y * 0.5));
                    draggedAnimal.position.y += (targetHeight - draggedAnimal.position.y) * 0.3;
                }
            }
            
            document.body.style.cursor = 'grabbing';
        }

        function checkHover() {
            raycaster.setFromCamera(mouse, camera);
            
            const visibleObjects = interactiveObjects.filter(obj => obj.visible);
            const intersects = raycaster.intersectObjects(visibleObjects, true);

            let newHovered = null;

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                // 向上遍历找到可交互的父对象
                while (obj.parent && obj.userData.projectId === undefined) {
                    obj = obj.parent;
                }
                if (obj.userData.projectId !== undefined) {
                    newHovered = obj;
                }
            }
            
            // 只有当悬停对象改变时才更新缩放
            if (newHovered !== hoveredObject) {
                // 重置之前悬停对象的缩放
                if (hoveredObject && !isDragging) {
                    const scale = hoveredObject.userData.originalScale || 1;
                    hoveredObject.scale.setScalar(scale);
                }
                
                // 设置新悬停对象的缩放
                hoveredObject = newHovered;
                if (hoveredObject && !isDragging) {
                    const scale = (hoveredObject.userData.originalScale || 1) * 1.15;
                    hoveredObject.scale.setScalar(scale);
                }
            }
            
            // 更新鼠标样式
            if (hoveredObject) {
                if (hoveredObject.userData.type === 'summer' && currentSeason === 1) {
                    document.body.style.cursor = 'grab';
                } else {
                    document.body.style.cursor = 'pointer';
                }
            } else {
            document.body.style.cursor = 'default';
            }
        }

        function onMouseDown(event) {
            if (event.button !== 0) return; // 只响应左键
            
            dragStartTime = Date.now();
            dragStartPos.set(event.clientX, event.clientY);
            
            // 检查是否点击了春季动物
            if (hoveredObject && hoveredObject.userData.type === 'summer' && currentSeason === 1) {
                isDragging = true;
                draggedAnimal = hoveredObject;
                draggedAnimal.userData.originalY = draggedAnimal.position.y;
                controls.enabled = false; // 禁用轨道控制
                document.body.style.cursor = 'grabbing';
            }
        }

        function onMouseUp(event) {
            const dragDuration = Date.now() - dragStartTime;
            const dragDistance = Math.sqrt(
                Math.pow(event.clientX - dragStartPos.x, 2) + 
                Math.pow(event.clientY - dragStartPos.y, 2)
            );
            
            // 重置拖拽状态
            const wasDragging = isDragging;
            if (isDragging) {
                isDragging = false;
                draggedAnimal = null;
                controls.enabled = true; // 重新启用轨道控制
            }
            
            // 如果不是拖拽动物，且点击时间/距离在阈值内，打开项目
            if (!wasDragging && dragDistance < DRAG_THRESHOLD) {
                if (hoveredObject && hoveredObject.userData.projectId !== undefined) {
                    openProject(hoveredObject.userData.projectId);
                }
            }
            
            checkHover();
        }

        function onClick(event) {
            // 作为备用：如果 mouseUp 没有处理，这里也尝试打开项目
            if (hoveredObject && hoveredObject.userData.projectId !== undefined) {
                // 只有在没有拖拽的情况下才处理
                if (!isDragging) {
                openProject(hoveredObject.userData.projectId);
                }
            }
        }

        // 双指点击(触控板会发成"右键"/contextmenu)在树场景里当作左键：
        // 阻止浏览器右键菜单，并在点击位置做 raycast 打开苹果项目。
        // 作品集页(oneDActive)保留正常右键，方便复制文字。
        function onContextMenu(event) {
            if (oneDActive) return;
            event.preventDefault();
            if (isDragging) return;
            // 1) 若双指点在 DOM 控件(社交链接 / 季节圆点 / 季节切换按钮)上，转发为点击
            const domHit = event.target && event.target.closest &&
                event.target.closest('.social-link, .scroll-dot, .season-nav-btn');
            if (domHit) { domHit.click(); return; }
            // 2) 否则在树场景里 raycast，命中苹果就打开项目
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const visibleObjects = interactiveObjects.filter(obj => obj.visible);
            const intersects = raycaster.intersectObjects(visibleObjects, true);
            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj && obj.userData.projectId === undefined && obj.parent) {
                    obj = obj.parent;
                }
                if (obj && obj.userData.projectId !== undefined) {
                    openProject(obj.userData.projectId);
                }
            }
        }

        function openProject(id) {
            const project = projects[id];
            document.getElementById('modalIcon').textContent = project.icon;
            document.getElementById('modalTitle').textContent = project.title;
            document.getElementById('modalDescription').textContent = project.description;
            
            // 显示状态 (如 "In Development")
            const statusEl = document.getElementById('modalStatus');
            statusEl.textContent = project.status || '';
            
            // 显示链接
            const linksEl = document.getElementById('modalLinks');
            linksEl.innerHTML = '';
            if (project.links && project.links.length > 0) {
                project.links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.className = 'modal-link';
                    a.textContent = link.label;
                    linksEl.appendChild(a);
                });
            }
            
            document.getElementById('projectModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
        }

        // ============================================
        // 自适应取景 — 关键：让画面"比例"在任何设备/浏览器下都一致
        // 以树为中心，按"较窄的一侧"自适应垂直 FOV，使树木在任意宽高比下
        // 都被框住且横向尺寸恒定。这样无论是从 Instagram 等 App 内置浏览器
        // 直接点进来，还是用手机浏览器打开，构图都完全一致；地址栏伸缩
        // 导致高度变化时，树不会忽大忽小、不跳动。
        // ============================================
        const FRAME_HALF_EXTENT = 11; // 需要始终框住的树木世界半尺寸
        const BASE_FOV = 60;          // 桌面端基准 FOV（保持原构图不收紧）

        function applyResponsiveFraming() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (!w || !h) return;

            camera.aspect = w / h;

            const dist = camera.position.distanceTo(controls.target) || 30;
            // 让高度和宽度都能容纳目标范围，取较大的 FOV（即按较窄一侧适配）
            const fovForHeight = 2 * Math.atan(FRAME_HALF_EXTENT / dist);
            const fovForWidth  = 2 * Math.atan(FRAME_HALF_EXTENT / (dist * camera.aspect));
            let fovDeg = THREE.MathUtils.radToDeg(Math.max(fovForHeight, fovForWidth));
            // 桌面/横屏不小于基准（保持原观感），竖屏放宽以容纳整棵树，并限制上限避免畸变
            fovDeg = Math.min(Math.max(fovDeg, BASE_FOV), 95);
            camera.fov = fovDeg;
            camera.updateProjectionMatrix();

            renderer.setSize(w, h);
        }

        function onWindowResize() {
            applyResponsiveFraming();
        }

        // ============================================================
        // 宇宙缩放之旅: 树 → 星球(单棵树) → 黑洞 → 一维个人网站
        // 垂直滚轮/双指捏合驱动 journey ∈ [0,1]; 平滑(丝滑)插值。
        // ============================================================
        let journey = 0, journeyTarget = 0;
        // "地球缩小 → 宇宙定格变模糊 → 像素坍塌" 是重头戏, 但节奏始终交给用户的手:
        // 进入电影段后降低手势灵敏度 (星球成形段要滚 ~2 倍距离, 变模糊→坍塌段要滚
        // ~5 倍距离) — 快速一甩推不到底, 继续滚就继续走, 停手即停。回滚方向不降
        // 灵敏度, 随时可快速滑回树场景。updateJourney 里另有一道宽松的速度兜底,
        // 只拦触控板惯性甩动这类一次涌入巨量增量的输入 (变模糊全程仍 ≥ ~4s)。
        const CINE_FROM = 0.32;           // 电影段起点 (星球开始成形前一点)
        const CINE_SPLIT = 0.66;          // 两段的分界 (星球成形完毕, 相机停稳)
        const CINE_DRAG_EARTH = 0.5;      // 0.32–0.66 前进手势灵敏度倍率
        const CINE_DRAG_COSMOS = 0.2;     // 0.66–1.0 前进手势灵敏度倍率
        const CINE_RATE_EARTH = 0.25;     // 兜底: 0.32–0.66 每秒最大推进量
        const CINE_RATE_COSMOS = 0.08;    // 兜底: 0.66–1.0 每秒最大推进量
        // 手势推进旅程统一走这里: 前进按电影段分段降灵敏度, 一次大增量跨段时逐段折算
        function nudgeJourneyTarget(dj) {
            let t = journeyTarget, guard = 0;
            while (dj !== 0 && guard++ < 32) {
                if (dj < 0) { t = Math.max(0, t + dj); break; }   // 回滚不降灵敏度
                let scale, edge;
                if (t < CINE_FROM) { scale = 1; edge = CINE_FROM; }
                else if (t < CINE_SPLIT) { scale = CINE_DRAG_EARTH; edge = CINE_SPLIT; }
                else { scale = CINE_DRAG_COSMOS; edge = 1; }
                const want = t + dj * scale;
                if (want <= edge) { t = want; dj = 0; }
                else { dj -= (edge - t) / scale; t = edge; if (t >= 1) dj = 0; }
            }
            journeyTarget = clampN(t, 0, 1);
        }
        // 树部特写: 捏开(或滚轮放大)到旅程 0 之后继续放大 → 镜头靠近树 (0=默认取景, 1=最近)。
        let treeZoom = 0, treeZoomTarget = 0;
        let swipeHandTimer = null;

        // 在树前驻留 3 秒 → 出现上滑手指提示; journey 一推进就撤掉。
        // 不再是一次性: 回到树前再驻留 3 秒会重新出现 (之前滑过一次就永远消失,
        // 用户会以为提示坏了/丢了)。
        function scheduleSwipeHandHint() {
            // 只在触屏(手机/平板)上出现 —— 桌面端有滚轮, 不需要上滑手势提示。
            // 除 pointer:coarse 外也认 touch 事件支持: DevTools 设备模拟等环境更可靠。
            const isTouch = window.matchMedia('(pointer: coarse)').matches ||
                'ontouchstart' in window || navigator.maxTouchPoints > 0;
            if (!isTouch) return;
            if (swipeHandTimer) return;                       // 已在倒计时
            const el = document.getElementById('swipeHint');
            if (el && el.classList.contains('visible')) return; // 已经显示着
            swipeHandTimer = setTimeout(() => {
                swipeHandTimer = null;
                // 正在近距离看树(treeZoom)时不打扰; 退出特写后外层每帧的
                // scheduleSwipeHandHint 会重新武装, 3 秒后再检查一次。
                if (journey < 0.02 && treeZoomTarget < 0.05 && !oneDActive) {
                    if (el) el.classList.add('visible');
                }
            }, 3000);
        }

        function dismissSwipeHandHint() {
            if (swipeHandTimer) { clearTimeout(swipeHandTimer); swipeHandTimer = null; }
            const el = document.getElementById('swipeHint');
            if (el) el.classList.remove('visible');
        }

        let cosmosInited = false, cosmicWorld = null;
        let planetMesh = null, planetAtmo = null, starField = null;
        let bhGroup = null, bhHorizon = null, bhPhoton = null, bhHalo = null, bhDisk = null, bhGlow = null;
        let pixCanvas = null, pixCtx = null, pixSrc = null, pixTmp = null, pixCells = null, pixCaptured = false, pixNeedsCapture = false;
        const PIX_BLOCK = 20, PIX_GAP = 5;   // 方块间距 PIX_GAP → 看得出是一颗颗像素
        let planetTexSeason = -1;
        const seasonBgColor = new THREE.Color(0.95, 0.92, 0.93);
        let oneDActive = false, sitePos = 0, siteMax = 0;
        const TREE_TARGET = new THREE.Vector3(0, 10, 0);
        const PLANET_TARGET = new THREE.Vector3(0, -14, 0);
        const BH_CENTER = new THREE.Vector3(0, -14, 0);
        const PLANET_R = 24;

        const lerpN = THREE.MathUtils.lerp;
        const clampN = THREE.MathUtils.clamp;
        function seg(j, a, b) { return clampN((j - a) / (b - a), 0, 1); }
        function smooth(x) { return x * x * (3 - 2 * x); }

        function makePlanetTexture(season) {
            // 统一漂亮蓝海; 陆地按季节微调(不刺眼); 极地用草地色与地面无缝衔接
            const ocean = '#3d83b8';
            const meadow = '#4a7c3f';                                  // = 地面草色
            const land = ['#6fa84d', '#4f9440', '#9aa24a'][season] || '#6fa84d'; // 春/夏/秋(金绿,不刺橙)
            const W = 1024, H = 512;
            const c = document.createElement('canvas'); c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            ctx.fillStyle = ocean; ctx.fillRect(0, 0, W, H);
            // 平滑圆润、互不重叠的大陆 (低频起伏闭合曲线)
            const continent = (cx, cy, rw, rh, color, seed) => {
                ctx.fillStyle = color;
                ctx.beginPath();
                const steps = 40;
                for (let i = 0; i <= steps; i++) {
                    const a = (i / steps) * Math.PI * 2;
                    const wob = 0.80 + 0.12 * Math.sin(a * 3 + seed) + 0.06 * Math.sin(a * 5 + seed * 2);
                    const px = cx + Math.cos(a) * rw * wob;
                    const py = cy + Math.sin(a) * rh * wob;
                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.closePath(); ctx.fill();
            };
            // 极地陆地 (树在陆地上; 北极 = 顶行; 用草地色 → 卷成星球时无缝)
            ctx.fillStyle = meadow; ctx.fillRect(0, 0, W, 50);
            continent(W * 0.5, 46, 150, 50, meadow, 1.0);
            // 分离放置的大陆 (互不重叠)
            const spots = [[0.16, 0.40], [0.44, 0.60], [0.74, 0.36], [0.30, 0.82], [0.64, 0.84], [0.90, 0.62]];
            spots.forEach((s, i) => continent(W * s[0], H * s[1], 92 + (i % 3) * 20, 66 + (i % 2) * 18, (i % 2) ? land : meadow, i + 2));
            const tex = new THREE.CanvasTexture(c); tex.needsUpdate = true; return tex;
        }

        function refreshPlanetSeason() {
            if (!planetMesh || planetTexSeason === currentSeason) return;
            planetTexSeason = currentSeason;
            const t = makePlanetTexture(currentSeason);
            if (planetMesh.material.map) planetMesh.material.map.dispose();
            planetMesh.material.map = t; planetMesh.material.needsUpdate = true;
            const atmoCols = [0xbfe0ff, 0xa8e6c0, 0xffd2a0];
            if (planetAtmo) planetAtmo.material.color.setHex(atmoCols[currentSeason] || 0xbfe0ff);
        }

        // ── 2D 像素坍塌 ──────────────────────────────────────────────
        // 不再用 3D 体素。做法: 把"用户最后那一帧"(3D 画面)整屏定格 → 截取像素 →
        // 全屏变成由方块组成的二维像素画 → 方块像倒塌的墙一样从左上逐个掉落 → 作品集页。
        function setupPixelCanvas() {
            pixCanvas = document.getElementById('pixelCanvas');
            if (pixCanvas) pixCtx = pixCanvas.getContext('2d');
            pixSrc = document.createElement('canvas');
            pixTmp = document.createElement('canvas');
        }

        // 定格当前 WebGL 帧 → 采样成 PIX_BLOCK 网格的方块 (颜色/位置/坍塌延迟)
        function capturePixelFrame() {
            if (!pixCanvas || !renderer) return;
            const W = window.innerWidth, H = window.innerHeight;
            pixSrc.width = W; pixSrc.height = H;
            pixSrc.getContext('2d').drawImage(renderer.domElement, 0, 0, W, H);
            pixCanvas.width = W; pixCanvas.height = H;
            const cols = Math.max(1, Math.ceil(W / PIX_BLOCK)), rows = Math.max(1, Math.ceil(H / PIX_BLOCK));
            pixTmp.width = cols; pixTmp.height = rows;
            const tctx = pixTmp.getContext('2d');
            tctx.drawImage(pixSrc, 0, 0, cols, rows);
            const data = tctx.getImageData(0, 0, cols, rows).data;
            const fract = (x) => x - Math.floor(x);
            const cells = [];
            for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
                const i = (r * cols + c) * 4;
                // 释放时刻 = 三角分布(两随机均值, 峰值~0.5) → 掉落数量"少→多→少", 像水流
                const r1 = fract(Math.sin(c * 12.9898 + r * 78.233) * 43758.5453);
                const r2 = fract(Math.sin(c * 39.346 + r * 11.135 + 4.7) * 24634.6345);
                const tri = (r1 + r2) * 0.5;
                const posBias = ((c / cols) + (r / rows)) / 2;                    // 轻微左上→右下倾向(不主导)
                cells.push({
                    x: c * PIX_BLOCK, y: r * PIX_BLOCK,
                    color: `rgb(${data[i]},${data[i + 1]},${data[i + 2]})`,
                    delay: clampN(tri + (posBias - 0.5) * 0.16, 0, 1)
                });
            }
            pixCells = { cells, W, H };
            pixCaptured = true;
        }

        // coarsenT 0→1: 清晰画面渐变成粗像素(实心,无缝);
        // gapT 0→1: 方块之间裂开缝隙 → 看得出是一颗颗像素;
        // collapseP 0→1: 从左上角开始,一颗颗有节奏地往下掉,直到掉光。
        function drawPixels(coarsenT, gapT, collapseP) {
            if (!pixCtx || !pixSrc || !pixSrc.width) return;
            const W = pixCanvas.width, H = pixCanvas.height;
            pixCtx.imageSmoothingEnabled = false;
            pixCtx.clearRect(0, 0, W, H);
            // 阶段1: 清晰 → 粗像素 (实心马赛克, 无缝, 平滑过渡)
            if (gapT <= 0 && collapseP <= 0) {
                const bs = Math.max(2, lerpN(4, PIX_BLOCK, coarsenT));
                const cols = Math.max(1, Math.round(W / bs)), rows = Math.max(1, Math.round(H / bs));
                pixTmp.width = cols; pixTmp.height = rows;
                pixTmp.getContext('2d').drawImage(pixSrc, 0, 0, cols, rows);
                pixCtx.drawImage(pixTmp, 0, 0, cols, rows, 0, 0, W, H);
                return;
            }
            if (!pixCells) return;
            // 阶段2: 缝隙张开 (gapT); 阶段3: 从左上逐颗下落 (collapseP)
            const gap = PIX_GAP * (collapseP > 0 ? 1 : gapT);
            const inner = PIX_BLOCK - gap, off = gap / 2;
            const RISE = 0.22;                            // 单颗下落历时; cell.delay = 释放时刻(三角分布)
            const trigger = collapseP * (1 + RISE);       // 扫过所有释放时刻; 数量自然少→多→少
            for (const cell of pixCells.cells) {
                const lt = collapseP > 0 ? clampN((trigger - cell.delay) / RISE, 0, 1) : 0;
                const fall = lt * lt * H * 1.5;          // 重力加速
                if (cell.y + fall > H) continue;          // 已掉出屏幕
                pixCtx.fillStyle = cell.color;
                pixCtx.fillRect(cell.x + off, cell.y + off + fall, inner, inner);
            }
        }

        // 黑洞软光带: RingGeometry + 顶点色, 亮度在带中间最高、内外边缘渐隐(sin 剖面)
        // → 是"发散的光圈", 没有贴着黑球的尖锐细环 (看起来更真实)
        function makeAccretionDisk(inner, outer) {
            const g = new THREE.RingGeometry(inner, outer, 140, 10);
            const pos = g.attributes.position;
            const colors = [];
            const hot = new THREE.Color(0xffe7bb), warm = new THREE.Color(0xd9742a);
            const tmp = new THREE.Color();
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), y = pos.getY(i);
                const r = Math.sqrt(x * x + y * y);
                const t = clampN((r - inner) / (outer - inner), 0, 1);
                const band = Math.sin(t * Math.PI);   // 0 在内外边缘, 1 在中间 → 无硬内环
                const a = band * band;                 // 更柔
                tmp.copy(hot).lerp(warm, t);
                const ang = Math.atan2(y, x);
                const flick = 0.8 + 0.2 * Math.sin(ang * 5.0);
                colors.push(tmp.r * a * flick, tmp.g * a * flick, tmp.b * a * flick);
            }
            g.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            const m = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.DoubleSide, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false });
            return new THREE.Mesh(g, m);
        }

        function createCosmos() {
            if (cosmosInited) return; cosmosInited = true;

            // 把树放进 cosmicWorld, 让星球+树作为一个小世界一起缩放/被吞入黑洞
            cosmicWorld = new THREE.Group();
            scene.add(cosmicWorld);
            if (tree && tree.parent) tree.parent.remove(tree);
            cosmicWorld.add(tree);

            // 星空
            const starCount = 1800;
            const sg = new THREE.BufferGeometry();
            const sp = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                const u = Math.random(), v = Math.random();
                const th = u * Math.PI * 2, ph = Math.acos(2 * v - 1);
                const r = 300 + Math.random() * 250;
                sp[i * 3] = r * Math.sin(ph) * Math.cos(th);
                sp[i * 3 + 1] = r * Math.cos(ph);
                sp[i * 3 + 2] = r * Math.sin(ph) * Math.sin(th);
            }
            sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
            starField = new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: 1.6, sizeAttenuation: true, transparent: true, opacity: 0, depthWrite: false }));
            starField.visible = false;
            scene.add(starField);

            // 星球 (北极对齐树根 y=0)
            planetMesh = new THREE.Mesh(
                new THREE.SphereGeometry(PLANET_R, 48, 36),
                new THREE.MeshStandardMaterial({ roughness: 0.95, metalness: 0.0, transparent: true, opacity: 1 })
            );
            planetMesh.position.set(0, -PLANET_R, 0);
            planetMesh.receiveShadow = false; planetMesh.visible = false; // 不接收树的大投影(避免丑陋阴影)
            cosmicWorld.add(planetMesh);
            planetAtmo = new THREE.Mesh(
                new THREE.SphereGeometry(PLANET_R * 1.07, 48, 36),
                new THREE.MeshBasicMaterial({ color: 0xbfe0ff, transparent: true, opacity: 0, side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false })
            );
            planetAtmo.position.copy(planetMesh.position);
            planetAtmo.visible = false;
            cosmicWorld.add(planetAtmo);

            // 黑洞
            const BH_R = 14;
            bhGroup = new THREE.Group();
            bhGroup.position.copy(BH_CENTER);
            bhGroup.visible = false; bhGroup.scale.setScalar(0.001);
            scene.add(bhGroup);
            bhHorizon = new THREE.Mesh(new THREE.SphereGeometry(BH_R, 64, 48), new THREE.MeshBasicMaterial({ color: 0x000000 }));
            bhGroup.add(bhHorizon);
            // 倾斜吸积盘 (软光带, 无尖锐细环)
            bhDisk = makeAccretionDisk(BH_R * 1.0, BH_R * 3.8);
            bhDisk.rotation.x = Math.PI / 2 - 0.42;
            bhGroup.add(bhDisk);
            // 竖直发散光环 (软, 过顶/过底) — 用户要的"竖着的发散的大圈"
            bhHalo = makeAccretionDisk(BH_R * 1.0, BH_R * 3.4);
            bhHalo.rotation.x = 0;            // XY 平面, 竖直, 面向相机
            bhGroup.add(bhHalo);
            // 柔和外发光圈
            bhGlow = new THREE.Mesh(new THREE.SphereGeometry(BH_R * 1.55, 32, 24), new THREE.MeshBasicMaterial({ color: 0xff9636, transparent: true, opacity: 0, side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false }));
            bhGroup.add(bhGlow);

            setupPixelCanvas();
            buildOneDSite();
            // 头像点击 → 直接硬切回最初的树 (无倒带/特效)
            const home = document.getElementById('fpHome');
            if (home) home.addEventListener('click', () => {
                const site = document.getElementById('oneDSite');
                if (site) site.style.transition = 'none';                 // 作品集页瞬间收起, 不淡出
                // 背景先复位到季节色, 否则 j<0.05 的快照会把天空染成太空黑
                if (scene.background && scene.background.isColor) scene.background.copy(seasonBgColor);
                journey = 0; journeyTarget = 0;                            // 直接定位到树
                treeZoom = 0; treeZoomTarget = 0;                          // 树部特写一并复位
                updateJourney(0);                                         // 本帧立即复位整个场景
                if (site) requestAnimationFrame(() => { site.style.transition = ''; });
            });
        }

        function setSurfaceOpacity(o) {
            const vis = o > 0.01;
            const ap = (m) => { if (m) { m.transparent = true; m.opacity = o; } };
            if (typeof groundMesh !== 'undefined' && groundMesh) { ap(groundMesh.material); groundMesh.visible = vis; }
            if (typeof grassMeshes !== 'undefined') grassMeshes.forEach(g => { ap(g.material); g.visible = vis; });
            if (typeof flowers !== 'undefined') flowers.forEach(f => { if (f.material) ap(f.material); f.visible = vis; });
            // 河流单独在 updateJourney 平滑处理 (只在秋天有)
        }

        function setTreeUIOpacity(o) {
            // .swipe-hint 不放在这里: 它有自己独立的 3 秒延迟出现 + 一次性撤销逻辑
            // (scheduleSwipeHandHint/dismissSwipeHandHint), 这里如果也去设 inline
            // opacity/animation, 会在用户还没滑动时就把它强制设成不透明、盖掉延迟效果。
            ['.season-indicator', '.hint-text', '.scroll-indicator', '.season-prev', '.season-next', '.social-links', '.name-title'].forEach(s => {
                document.querySelectorAll(s).forEach(el => {
                    el.style.opacity = o;
                    el.style.pointerEvents = o < 0.5 ? 'none' : '';
                    el.style.animation = o < 0.99 ? 'none' : ''; // 关闭 pulse 等动画, 否则会覆盖透明度
                });
            });
        }

        function setOneDActive(active) {
            if (active === oneDActive) return;
            oneDActive = active;
            const site = document.getElementById('oneDSite');
            if (!site) return;
            if (active) { site.classList.add('active'); site.scrollTop = 0; setTimeout(typeHero, 320); }
            else { site.classList.remove('active'); }
        }

        // "Hey, I'm Jane." 打字机效果 (每次进入作品集页时重新打出)
        // 文案写死, 不从 DOM 读: Chrome 网页翻译会改写 textContent, 从 DOM 读会把
        // 译文缓存成"原文", 关掉翻译后就永远换不回英文 (h1 同时标了 translate="no")。
        function typeHero() {
            const el = document.querySelector('.fp-hero');
            if (!el) return;
            const full = "Hey, I'm Jane.";
            clearInterval(el._typeTimer);
            clearTimeout(el._typeDone);
            el.textContent = '';
            el.classList.add('typing');
            let i = 0;
            el._typeTimer = setInterval(() => {
                i++;
                el.textContent = full.slice(0, i);
                if (i >= full.length) {
                    clearInterval(el._typeTimer);
                    el._typeDone = setTimeout(() => el.classList.remove('typing'), 1500); // 打完后光标再闪几下
                }
            }, 80);
        }

        function updateJourney(dt) {
            if (!cosmosInited) return;
            // 限制单帧 dt: 标签页切后台再回来(或手机浏览器节流 rAF)时 dt 会是好几秒,
            // journey 一帧直接跳到目标 → 跳过中段"拉回平视"过渡, 用户自由旋转过的
            // 俯仰角会原样带回树场景, 被 OrbitControls 钳位成奇怪的俯视角。
            // 钳住后大跳变成 ~20 帧的快速动画, 每个过渡段都能正常走完。
            dt = Math.min(dt, 0.066);
            // 平滑趋近目标 (丝滑); 前进进入电影段后按 CINE_RATE_* 限速 (见常量注释)
            const jPrev = journey;
            journey += (journeyTarget - journey) * Math.min(1, dt * 3.2);
            if (journey > jPrev && journey > CINE_FROM) {
                const base = Math.max(jPrev, CINE_FROM);
                const rate = base < CINE_SPLIT ? CINE_RATE_EARTH : CINE_RATE_COSMOS;
                journey = Math.min(journey, base + rate * dt);
            }
            treeZoom += (treeZoomTarget - treeZoom) * Math.min(1, dt * 3.2);
            // 单指上滑直接推进旅程时, 残留的树部特写自动缓缓退出
            if (journeyTarget > 0.02 && treeZoomTarget > 0) treeZoomTarget = Math.max(0, treeZoomTarget - dt * 1.5);
            const j = journey;
            if (j < 0.05 && scene.background && scene.background.isColor) seasonBgColor.copy(scene.background);

            if (bhDisk) bhDisk.rotation.z += dt * 0.18;

            // 相机: 0–0.30 拉远看更多地面; 0.30–0.66 地面卷成星球; 0.66+ 停留观看像素化与坍塌
            const tgt = new THREE.Vector3().lerpVectors(TREE_TARGET, PLANET_TARGET, smooth(seg(j, 0.30, 0.66)));
            controls.target.copy(tgt);
            let dist;
            // 树部特写: treeZoom 把默认距离 30 拉近到最近 13 (只在旅程起点附近有感)
            const nearDist = lerpN(30, 13, smooth(treeZoom));
            if (j < 0.30) dist = lerpN(nearDist, 56, smooth(seg(j, 0.0, 0.30)));
            else if (j < 0.66) dist = lerpN(56, 95, smooth(seg(j, 0.30, 0.66)));
            else dist = 95;
            controls.minDistance = controls.maxDistance = dist;

            // 旋转策略分三段:
            //   j < 0.08        树场景 — OrbitControls 正常旋转(原有行为);
            //   0.08–0.50 过渡  — 禁止旋转(手机单指上滑推进旅程会被 OrbitControls 当成
            //                     旋转, 一次长滑动会把视角转到底, 变成从下方仰视星球);
            //   0.50–0.71 宇宙  — 星球成形后重新开放自由旋转: 桌面拖鼠标、手机单指拖动
            //                     都能环绕星球随意参观(此阶段手机的旅程推进/后退交给
            //                     双指捏合, 见 onTouchStart 的 touchGestureOrbit)。
            //   j > 0.71 像素坍塌 — 画面已定格, 旋转无意义, 关掉让单指滑动继续控制旅程。
            const freeOrbit = j > 0.50 && j < 0.71;
            controls.enableRotate = j < 0.08 || freeOrbit;
            // 宇宙参观时放开俯仰限制(可以绕到星球上方/下方); 回到树附近再恢复默认,
            // 中间留滞回带 —— 归途中 levelBlend 会先把俯仰平滑拉回平视, 再收紧限制,
            // 避免 OrbitControls 突然钳位导致视角跳变。
            if (freeOrbit) {
                controls.minPolarAngle = 0.05;
                controls.maxPolarAngle = Math.PI - 0.05;
            } else if (j < 0.2) {
                controls.minPolarAngle = Math.PI / 4;
                controls.maxPolarAngle = Math.PI / 1.8;
            }
            {
                const offset = camera.position.clone().sub(controls.target);
                const r = offset.length();
                if (r > 0.001) {
                    const theta = Math.atan2(offset.x, offset.z);
                    const curPhi = Math.acos(clampN(offset.y / r, -1, 1));
                    // 只在中段过渡强制"平视"(0.18–0.30 全力, 0.30–0.50 松手);
                    // 进入宇宙阶段(>0.50)完全交还给用户旋转, 否则每帧都会把
                    // 用户拖出来的俯仰角拽回去, 变成"橡皮筋"。松手带放宽到 0.20,
                    // 归途中从大俯仰角回正时有 ~0.3s 缓冲, 不会猛地一甩。
                    const levelBlend = smooth(seg(j, 0, 0.18)) * (1 - smooth(seg(j, 0.30, 0.50)));
                    const phi = lerpN(curPhi, Math.PI / 2, levelBlend);
                    camera.position.set(
                        controls.target.x + dist * Math.sin(phi) * Math.sin(theta),
                        controls.target.y + dist * Math.cos(phi),
                        controls.target.z + dist * Math.sin(phi) * Math.cos(theta)
                    );
                }
            }

            // 背景/雾/星空: 地面卷起时天空渐暗进入太空
            const space = smooth(seg(j, 0.42, 0.64));
            const bg = new THREE.Color().lerpColors(seasonBgColor, new THREE.Color(0x06070d), space);
            if (scene.background && scene.background.isColor) scene.background.copy(bg); else scene.background = bg.clone();
            if (scene.fog) { scene.fog.color.copy(bg); scene.fog.far = lerpN(80, 100000, smooth(seg(j, 0.30, 0.50))); }
            if (starField) { const so = smooth(seg(j, 0.46, 0.66)); starField.material.opacity = so; starField.visible = so > 0.01; }

            // 地面淡出 (0.26→0.40); 大星球已铺在下方(草地色无缝) → 无灰平地中间态
            setSurfaceOpacity(1 - smooth(seg(j, 0.26, 0.40)));
            // 树/星球的缩放比例 (河流共用它 → 河流与树同比例, 不再独立塌缩)
            const morph = smooth(seg(j, 0.38, 0.68));
            // 河流系统(只秋季): 与树用同一比例缩放, 并随地面一起淡出(不再独立缩成0) → 自然
            // → 地面/河流淡完(j≈0.40)远早于进入太空, 仍不会有绿色河带 bug
            {
                const o = (currentSeason === 2) ? (1 - smooth(seg(j, 0.26, 0.40))) : 0;  // 与地面同步淡出
                const vis = (currentSeason === 2) && o > 0.01;
                const treeScale = lerpN(1, 0.5, morph);                                   // 和树相同比例 → 比例不变
                const fadeRiv = (m, isWater) => {
                    if (!m) return;
                    m.visible = vis;
                    m.scale.setScalar(treeScale);
                    if (isWater && m.material && m.material.uniforms && m.material.uniforms.uOpacity) {
                        if (m.userData.baseOpacity === undefined) m.userData.baseOpacity = m.material.uniforms.uOpacity.value;
                        m.material.uniforms.uOpacity.value = m.userData.baseOpacity * o;
                    } else if (m.material) {
                        m.material.transparent = true;
                        if (m.userData.baseOpacity === undefined) m.userData.baseOpacity = (m.material.opacity != null ? m.material.opacity : 1);
                        m.material.opacity = m.userData.baseOpacity * o;
                    }
                };
                fadeRiv(riverMesh, true);
                fadeRiv(riverbedMesh, false);
                if (typeof riverBanks !== 'undefined') riverBanks.forEach(b => fadeRiv(b, false));
                if (j > 0.06) {
                    if (typeof jumpingFishes !== 'undefined') jumpingFishes.forEach(f => f.visible = false);
                    if (typeof splashParticles !== 'undefined') splashParticles.forEach(s => s.visible = false);
                }
            }
            if (j > 0.26) { animals.forEach(a => a.visible = false); fallingLeaves.forEach(l => l.visible = false); }

            // 星球: 0.28 起以超大半径出现(看似平地, 草地色), 0.38→0.68 半径缩小 → 地面"卷"成星球
            if (planetMesh) {
                refreshPlanetSeason();
                const pscale = lerpN(20, 1, morph);
                planetMesh.visible = j > 0.28;
                planetMesh.scale.setScalar(pscale);
                planetMesh.position.y = -PLANET_R * pscale; // 北极始终落在 y=0 (树根处)
                planetMesh.material.opacity = 1;
                if (planetAtmo) {
                    const ao = smooth(seg(j, 0.60, 0.72));
                    planetAtmo.visible = ao > 0.01;
                    planetAtmo.scale.setScalar(pscale);
                    planetAtmo.position.y = planetMesh.position.y;
                    planetAtmo.material.opacity = 0.28 * ao;
                }
            }
            // 树与星球同步、同缓动缩小 → 比例平滑变化, 不突兀
            if (tree) tree.scale.setScalar(lerpN(1, 0.5, morph));

            // 宇宙坍塌: 把"用户最后那一帧"3D 画面整屏定格 → 全屏变成二维像素方块 →
            // 像倒塌的墙一样从左上逐个掉落 → 作品集页 (不再是 3D 立体方块)
            if (bhGroup) bhGroup.visible = false;
            const pix = j > 0.71;
            if (pix) {
                if (!pixCaptured) {
                    pixNeedsCapture = true;          // 本帧 3D 照常渲染, 渲染后再定格(见 animate)
                } else {
                    // 该帧已定格成像素 → 隐藏全部 3D, 只显示二维像素层
                    if (planetMesh) planetMesh.visible = false;
                    if (planetAtmo) planetAtmo.visible = false;
                    if (tree) tree.visible = false;
                    if (starField) starField.visible = false;   // 天空/星星已一并变成方块
                    if (pixCanvas) { pixCanvas.style.display = 'block'; pixCanvas.style.opacity = '1'; }
                    const coarsenT = smooth(seg(j, 0.71, 0.77));  // 清晰 → 粗像素
                    const gapT = smooth(seg(j, 0.77, 0.85));      // 裂开缝隙 → 一颗颗像素
                    // 0.85–0.93 之间 gapT 已经是 1、collapseP 还是 0 → 马赛克完整定住不动,
                    // 给用户足够时间看清这一帧, 不再是转瞬即逝。
                    const collapseP = seg(j, 0.93, 0.975);        // 从左上逐颗往下掉, 掉光
                    drawPixels(coarsenT, gapT, collapseP);
                }
            } else {
                pixCaptured = false; pixNeedsCapture = false;    // 倒带回去: 复原 3D
                if (pixCanvas) pixCanvas.style.display = 'none';
                if (tree) tree.visible = true;
            }

            // 树场景 UI 淡出
            setTreeUIOpacity(1 - smooth(seg(j, 0.04, 0.18)));
            if (j > 0.02) dismissSwipeHandHint();
            else if (!oneDActive) scheduleSwipeHandHint();     // 回到树前重新武装 (内部有防重入)

            // 塌完 → 暖炭微光 → 作品集页
            const flash = document.getElementById('cosmosFlash');
            if (flash) flash.style.opacity = smooth(seg(j, 0.96, 0.978)) * (1 - smooth(seg(j, 0.99, 1.0)));
            const canvasC = document.getElementById('canvas-container');
            if (canvasC) canvasC.style.opacity = pixCaptured ? '0' : '1';
            setOneDActive(j >= 0.978);
        }
